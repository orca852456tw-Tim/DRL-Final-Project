<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRL SMC XAI Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1c2c 0%, #4a192c 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px;
            width: 90%;
            max-width: 1200px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(to right, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9em;
            color: #ccc;
        }

        input, select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #ff8a00;
        }

        .kpi-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .kpi-card {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .kpi-title {
            font-size: 1em;
            color: #aaa;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ffcc;
        }

        .charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
        }
        
        .chart-container-half {
            flex: 1;
            position: relative;
            height: 350px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>DRL SMC XAI 智能決策儀表板</h1>

        <div class="controls">
            <div class="control-group">
                <label for="capital">初始資金 (Initial Capital)</label>
                <input type="number" id="capital" value="1000000" min="10000" step="10000">
            </div>
            <!-- 下拉選單在此版本純屬裝飾，真實數據由 Python 直接注入 -->
            <div class="control-group">
                <label for="style">投資風格 (Investment Style)</label>
                <select id="style" disabled>
                    <option value="historical" selected>歷史真實回測數據</option>
                </select>
            </div>
        </div>

        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-title">預期年化報酬 (CAGR)</div>
                <div class="kpi-value" id="kpi-cagr">5.2%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">勝率 (Win Rate)</div>
                <div class="kpi-value" id="kpi-winrate">75.0%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">最大回撤 (Max Drawdown)</div>
                <div class="kpi-value" id="kpi-mdd" style="color: #ff4444;">-5.0%</div>
            </div>
        </div>

        </div>
        
        <div class="charts-row">
            <div class="chart-container-half">
                <canvas id="radarChart"></canvas>
            </div>
            <div class="chart-container-half">
                <canvas id="trainingChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="projectionChart"></canvas>
        </div>
    </div>

    <script>
        let projectionChart = null;
        
        // 來自 Python 的真實軌跡數據 (Multipliers)
        const basePaths = [[1.0, 1.002245955416713, 0.9921864882219295, 0.9904934495976784, 1.005939703442204, 0.9994836224725389, 1.0293855215930947, 1.0218441554261455, 1.0477514756863233, 1.0626486478285164, 1.0809320590073566, 1.0924785147635654, 1.102991675900928, 1.1026803816075492, 1.1110666389797865, 1.1462848897252451, 1.1664067396259872, 1.158906588433793, 1.1939164028255782, 1.2025561306964285, 1.2147164424665768, 1.2375860578338276, 1.2216915636827872, 1.234012530891562, 1.2449522326883764, 1.2330151352013243, 1.2073908171919727, 1.2258268336777118, 1.235448791028136, 1.2464649271787487, 1.2947307643938413, 1.2792636366298453, 1.2859656708316958, 1.2937977485297476, 1.2974970934740673, 1.2957086371999342, 1.2958536452258265], [1.0, 1.0233311014651862, 1.0328197391942977, 1.0414007610211096, 1.0549128286297105, 1.0669924151723857, 1.0908338993418514, 1.134012416184074, 1.15931060475349, 1.1641163928948661, 1.1849916513149905, 1.1669941482225408, 1.184720944332207, 1.2252127144477667, 1.2408575943549298, 1.2312066297123585, 1.2470655775239516, 1.2628356322108518, 1.306767680879298, 1.3025460222995595, 1.3368072122359453, 1.3119021699222115, 1.319033868440096, 1.355584823050728, 1.346059963664625, 1.3640660315079676, 1.3700905894685187, 1.3762538460445228, 1.3881300451170224, 1.3545327242625262, 1.367788364650857, 1.383733264377764, 1.4180491812290361, 1.4483701118564591, 1.480778192927798, 1.4784214699330485, 1.5384068423268686], [1.0, 1.006515660409714, 0.9934774055806552, 0.9843857229621336, 0.961571651973048, 0.9749498877956658, 0.9823035717980632, 1.0075020852220604, 1.0185796794002613, 1.0207155673396562, 1.0335912779748564, 1.0422006152479646, 1.0592093789658876, 1.0490272560366896, 1.0280705732949973, 1.0140848507320777, 1.0111433203097675, 1.026323693675702, 1.0209904116674229, 1.025536973042648, 1.0178280268681639, 1.0262042845074486, 1.037806731718107, 1.0559786538834623, 1.0330081611798807, 1.0411524045516187, 1.0203538988062295, 1.033864141681177, 1.017540274429096, 1.0086640415026162, 1.0163848532122532, 1.010560240330555, 1.0206251912594055, 1.0118068831912908, 1.0220058240911196, 1.021362164635356, 1.0147599632208657]];
        const radarData = [0.0, 0.0, 33.33333333333333, 100.0, 43.821472922960915];
        const rewardsData = [-764.7681818181819, -128.16454545454548, -765.2872727272727, -124.89181818181818, -732.0154545454545, -152.1827272727273, -127.79523809523809];
        const lossData = [0.0001061106304405, 4.952552990289405e-05, 0.0002315974561497, 0.000342868064763, 7.214638753794134e-05, 0.0010607403237372, 9.366393351228908e-05, 0.0011381569784134, 0.0004368695663288, 0.0008442620746791, 0.0008978964178822, 0.0004391135589685, 0.0004741485172417, 0.0004239847476128, 0.0010787041392177, 0.0016264230944216, 0.0005020393873564, 0.000412703200709, 9.9308217613725e-06, 0.0002434752095723, 0.0024081033188849, 0.001687878742814, 0.000855850870721, 0.0003615324676502, 0.00060114369262, 0.001043101074174, 0.0013363829348236, 9.056877752300352e-05, 0.001894234213978, 0.000192390900338, 0.0008247747900895, 6.682320235995576e-05, 0.001119093503803, 0.0001076944172382, 0.0002455305075272, 0.0002396115887677, 0.0005555476527661, 0.0004875666927546];

        // Initialize XAI Charts
        function initXAICharts() {
            Chart.defaults.color = '#ccc';
            
            // Radar Chart
            const ctxRadar = document.getElementById('radarChart').getContext('2d');
            new Chart(ctxRadar, {
                type: 'radar',
                data: {
                    labels: ['距離頂部阻力(%)', '距離底部支撐(%)', '存在 FVG 缺口', '流動性掃蕩', 'ATR 波動率'],
                    datasets: [{
                        label: 'DQN 買進決策特徵 (0-100權重)',
                        data: radarData,
                        backgroundColor: 'rgba(0, 255, 204, 0.2)',
                        borderColor: 'rgba(0, 255, 204, 1)',
                        pointBackgroundColor: 'rgba(0, 255, 204, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.2)' },
                            grid: { color: 'rgba(255, 255, 255, 0.2)' },
                            pointLabels: { color: '#fff', font: { size: 12 } },
                            ticks: { display: false, max: 100, min: 0 }
                        }
                    },
                    plugins: {
                        title: { display: true, text: '決策可解釋性 (Basis of Results)', color: '#fff', font: { size: 16 } }
                    }
                }
            });

            // Training Chart (Dual Axis for Loss and Reward)
            const ctxTrain = document.getElementById('trainingChart').getContext('2d');
            
            const rewardLabels = Array.from({length: rewardsData.length}, (_, i) => 'Stage ' + (i+1));
            // Pad loss to match reward labels or just plot them separately. 
            // Better to just plot loss vs iterations
            const lossLabels = Array.from({length: lossData.length}, (_, i) => i * 2); 
            
            new Chart(ctxTrain, {
                type: 'line',
                data: {
                    labels: lossLabels,
                    datasets: [
                        {
                            label: 'Loss (左軸)',
                            data: lossData,
                            borderColor: 'rgba(255, 68, 68, 0.8)',
                            yAxisID: 'y',
                            tension: 0.1,
                            pointRadius: 0
                        },
                        {
                            label: 'Avg Reward (右軸, 簡化對齊)',
                            data: Array.from({length: lossData.length}, (_, i) => {
                                let idx = Math.floor((i / lossData.length) * rewardsData.length);
                                return rewardsData[idx];
                            }),
                            borderColor: 'rgba(255, 138, 0, 0.8)',
                            yAxisID: 'y1',
                            tension: 0.3,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Loss', color: '#ccc' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: 'Reward', color: '#ccc' },
                            grid: { drawOnChartArea: false }
                        }
                    },
                    plugins: {
                        title: { display: true, text: 'DQN 真實訓練歷程 (Training Process)', color: '#fff', font: { size: 16 } }
                    }
                }
            });
        }

        function updateDashboard() {
            const capital = parseFloat(document.getElementById('capital').value);
            
            // 根據輸入資金動態計算真實資產軌跡
            const paths = basePaths.map(path => path.map(val => val * capital));
            
            const labels = [];
            for (let i = 0; i <= 36; i++) {
                labels.push('Month ' + i);
            }

            const datasets = [
                {
                    label: '最佳情境 (95th Percentile)',
                    data: paths[0],
                    borderColor: 'rgba(0, 255, 204, 0.8)',
                    backgroundColor: 'rgba(0, 255, 204, 0.1)',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '預期情境 (50th Percentile)',
                    data: paths[1],
                    borderColor: 'rgba(255, 138, 0, 0.8)',
                    backgroundColor: 'rgba(255, 138, 0, 0.1)',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.4
                },
                {
                    label: '最差情境 (5th Percentile)',
                    data: paths[2],
                    borderColor: 'rgba(255, 68, 68, 0.8)',
                    backgroundColor: 'rgba(255, 68, 68, 0.1)',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4
                }
            ];

            if (projectionChart) {
                projectionChart.data.labels = labels;
                projectionChart.data.datasets = datasets;
                projectionChart.update();
            } else {
                const ctx = document.getElementById('projectionChart').getContext('2d');
                Chart.defaults.color = '#ccc';
                projectionChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            title: {
                                display: true,
                                text: '未來 3 年資產投影圖 (基於真實回測分佈)',
                                color: '#fff',
                                font: { size: 16 }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(context.parsed.y);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            },
                            x: {
                                grid: { color: 'rgba(255, 255, 255, 0.1)' }
                            }
                        }
                    }
                });
            }
        }

        // Event Listeners
        document.getElementById('capital').addEventListener('change', updateDashboard);
        document.getElementById('capital').addEventListener('keyup', updateDashboard);

        // Initial Load
        initXAICharts();
        updateDashboard();
    </script>
</body>
</html>
